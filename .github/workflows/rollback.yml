name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - staging
          - production
      image_sha:
        description: "Git SHA of image to rollback to (7-char, e.g. abc1234)"
        required: true
        type: string
      rollback_migration:
        description: "Alembic revision to downgrade to (e.g. 036). Leave empty to skip migration rollback."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists in GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ inputs.image_sha }}

      - name: Rollback migration
        if: inputs.rollback_migration != ''
        env:
          DATABASE_URL_SYNC: ${{ inputs.environment == 'production' && secrets.PROD_DATABASE_URL_SYNC || secrets.STAGING_DATABASE_URL_SYNC }}
        run: |
          cd backend
          pip install -e .
          echo "Current revision:"
          alembic current
          echo "Downgrading to: ${{ inputs.rollback_migration }}"
          alembic downgrade ${{ inputs.rollback_migration }}
          echo "New revision:"
          alembic current

      - name: Deploy previous image
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_SHA: ${{ inputs.image_sha }}
        with:
          host: ${{ inputs.environment == 'production' && secrets.PROD_HOST || secrets.STAGING_HOST }}
          username: ${{ inputs.environment == 'production' && secrets.PROD_SSH_USER || secrets.STAGING_SSH_USER }}
          key: ${{ inputs.environment == 'production' && secrets.PROD_SSH_KEY || secrets.STAGING_SSH_KEY }}
          script_stop: true
          envs: IMAGE_SHA
          script: |
            set -euo pipefail
            cd /opt/ecom-netsuite
            : "${IMAGE_SHA:?image_sha input missing}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Pull the immutable SHA-tagged rollback image and retag it :latest so
            # docker-compose.prod.yml (which pins :latest) brings up this exact image.
            # `docker compose pull` alone would re-pull :latest (the current image) and the
            # rollback would be a silent no-op — the bug this step previously had.
            IMG="ghcr.io/aideny-kr/ecom-netsuite-suites/backend"
            docker pull "${IMG}:sha-${IMAGE_SHA}"
            docker tag "${IMG}:sha-${IMAGE_SHA}" "${IMG}:latest"
            PULLED_DIGEST=$(docker inspect --format '{{.Id}}' "${IMG}:sha-${IMAGE_SHA}")
            docker compose -f docker-compose.prod.yml up -d --no-deps backend worker beat
            # Poll until the backend container advances to the rollback image (recreation
            # lags `up -d`); fail loud if it never matches instead of false-passing green.
            RUNNING_DIGEST=""
            for _ in $(seq 1 12); do
              RUNNING_DIGEST=$(docker inspect --format '{{.Image}}' ecom-netsuite-backend-1 2>/dev/null || true)
              [ "$PULLED_DIGEST" = "$RUNNING_DIGEST" ] && break
              sleep 5
            done
            if [ "$PULLED_DIGEST" != "$RUNNING_DIGEST" ]; then
              echo "::error::rollback container not on sha-${IMAGE_SHA} after 60s. Pulled $PULLED_DIGEST but container has $RUNNING_DIGEST"
              exit 1
            fi
            # Health check with retry: the digest poll above breaks at container-creation,
            # not app-ready, so uvicorn may not be listening yet (a single immediate curl
            # races startup and false-fails). Poll up to 60s; fail loud if it never comes up.
            health_ok=
            for _ in $(seq 1 12); do
              if curl -fsS -o /dev/null http://localhost:8000/api/v1/health; then health_ok=1; break; fi
              sleep 5
            done
            [ -n "$health_ok" ] || { echo "::error::backend health check never passed after 60s"; exit 1; }
