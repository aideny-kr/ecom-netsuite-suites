name: Agent Benchmark Gate

on:
  pull_request:
    paths:
      - 'backend/app/services/chat/**'
      - 'backend/app/services/query_pattern_service.py'
      - 'backend/app/services/confidence_service.py'
      - 'backend/app/mcp/**'
      - 'backend/app/services/benchmarks/**'
      - 'backend/tests/agent_benchmarks/**'
      - '.github/workflows/agent-benchmark.yml'
      # Metric catalog paths (grill R2#19): changes to metric definitions,
      # compute logic, or the seeding migration should trigger the benchmark
      # so that named-metric routing regressions are caught automatically.
      - 'backend/app/services/metrics/**'
      - 'backend/alembic/versions/080_metric_definitions.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-benchmark:
    name: vs-MCP Agent Benchmark
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecom_netsuite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ecom_netsuite_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/ecom_netsuite_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci
      ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzISEh
      APP_ENV: test
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-bench-
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Generate valid Fernet encryption key
        run: |
          FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "ENCRYPTION_KEY=$FERNET_KEY" >> "$GITHUB_ENV"

      - name: Run Alembic migrations
        run: cd backend && alembic upgrade head

      - name: Plan Mode behavioral eval
        # Static regex-only eval against 50 golden CFO/ops queries. No LLM
        # calls — runs in <1s and is safe on every PR. Gates that
        # `is_financial_ambiguous` keeps its contract: ~20% ask-rate, no
        # regression on financial_ambiguous coverage, no false positives on
        # concrete ops queries.
        run: cd backend && python -m tests.agent_benchmarks.plan_mode.run

      - name: Skip benchmark when ANTHROPIC_API_KEY secret is missing
        id: check_secret
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "ANTHROPIC_API_KEY is not set; skipping agent benchmark." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run vs-MCP agent benchmark (sales suite)
        if: steps.check_secret.outputs.skip != 'true'
        run: |
          cd backend && python -m app.services.benchmarks.run_vs_mcp \
            --suite sales \
            --tenant-id ce3dfaad-626f-4992-84e9-500c8291ca0a \
            --skip-baseline \
            --no-llm-judge

      - name: Run vs-MCP agent benchmark (metric case)
        if: steps.check_secret.outputs.skip != 'true'
        # Non-blocking (report-only) — see continue-on-error below.
        # NEW-4 fix: the metric_net_margin_last_quarter case is NOT in the
        # 'sales' suite (its case_id starts with 'metric_', not 'sales_'),
        # so --suite sales excluded it entirely. This dedicated step ensures
        # the metric routing gate is actually exercised + reported in CI.
        #
        # Why report-only (not a hard gate yet): in branch CI there is no live
        # NetSuite connection AND net_margin's leaves seed as DRAFT placeholders
        # (uncomputable by design, §D3), so even a perfectly-routed
        # metric_compute call returns missing_dependency — the agent then
        # reasonably falls back to direct NetSuite tools, tripping the
        # "metric_compute bypass" gate. Routing for named metrics is currently
        # prompt-guided (§D2), not enforced, so this assertion is aspirational
        # and non-deterministic in a degraded env. The sales-suite step above
        # stays a hard gate; this one tracks the routing target without blocking.
        #
        # TODO(metrics/grill-R2#19): flip back to a HARD gate (drop
        # continue-on-error) once (a) routing for named metrics is enforced
        # (§D2) and (b) a computable metric fixture + live ANTHROPIC_API_KEY are
        # reliably available in branch CI — then also run WITHOUT --skip-baseline
        # / --no-llm-judge so it proves "our agent >= Claude+MCP baseline".
        continue-on-error: true
        run: |
          cd backend && python -m app.services.benchmarks.run_vs_mcp \
            --case metric_net_margin_last_quarter \
            --tenant-id ce3dfaad-626f-4992-84e9-500c8291ca0a \
            --skip-baseline \
            --no-llm-judge
