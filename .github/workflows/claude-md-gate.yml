name: CLAUDE.md gate

on:
  push:
    branches: [main]
    paths:
      - CLAUDE.md
  pull_request:
    paths:
      - CLAUDE.md

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CLAUDE.md size + drift markers
        run: |
          set -e
          FAILED=0

          LINES=$(wc -l < CLAUDE.md | tr -d ' ')
          echo "CLAUDE.md is $LINES lines."
          if [ "$LINES" -gt 200 ]; then
            echo "::error file=CLAUDE.md::CLAUDE.md is $LINES lines (max 200). Move content to .claude/rules/ or .claude/skills/."
            FAILED=1
          fi

          if grep -nE 'PR #[0-9]+' CLAUDE.md; then
            echo "::error file=CLAUDE.md::CLAUDE.md contains PR-narrative references. Move to memory/project_session_*.md or commit message body."
            FAILED=1
          fi

          if grep -nE '^- \*\*v[0-9]+\.[0-9]+' CLAUDE.md; then
            echo "::error file=CLAUDE.md::CLAUDE.md contains changelog-style version headers. Delete — git log + memory/ already capture this."
            FAILED=1
          fi

          exit $FAILED
