name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ── Gate: only proceed if CI passed ──────────────────────────
  gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed, proceeding with deployment"

  # ── Build and push Docker images to GHCR ─────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: gate
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Migration safety check ───────────────────────────────────
  migration-check:
    name: Migration Safety Check
    runs-on: ubuntu-latest
    needs: gate
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migration_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/migration_check
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/migration_check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Check Alembic heads (no branch conflicts)
        run: |
          cd backend
          HEADS=$(alembic heads 2>&1 | grep -c "(head)")
          if [ "$HEADS" -gt 1 ]; then
            echo "::error::Multiple Alembic heads detected. Merge migrations first."
            alembic heads
            exit 1
          fi

      - name: Upgrade to head
        run: cd backend && alembic upgrade head

      - name: Downgrade one step (rollback test)
        run: cd backend && alembic downgrade -1

      - name: Re-upgrade to head (idempotency test)
        run: cd backend && alembic upgrade head

      - name: Check for destructive operations
        run: |
          cd backend
          CHANGED_MIGRATIONS=$(git diff --name-only origin/main~1..HEAD -- alembic/versions/ 2>/dev/null || true)
          if [ -n "$CHANGED_MIGRATIONS" ]; then
            for f in $CHANGED_MIGRATIONS; do
              if grep -qiE '(drop_table|drop_column)' "$f" 2>/dev/null; then
                echo "::warning file=$f::Contains destructive operation (DROP). Verify data migration plan."
              fi
            done
          fi

  # ── Deploy to Staging (auto on main merge) ──────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images, migration-check]
    if: >-
      (github.event_name == 'workflow_run') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Alembic migrations against staging DB
        env:
          DATABASE_URL_SYNC: ${{ secrets.STAGING_DATABASE_URL_SYNC }}
        run: |
          cd backend
          pip install -e .
          alembic upgrade head

      - name: Deploy backend to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/ecom-netsuite
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps backend worker
            sleep 10
            curl -f http://localhost:8000/api/v1/health || exit 1

  # ── Deploy to Production (manual approval required) ─────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, migration-check]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Alembic migrations against production DB
        env:
          DATABASE_URL_SYNC: ${{ secrets.PROD_DATABASE_URL_SYNC }}
        run: |
          cd backend
          pip install -e .
          alembic current
          alembic upgrade head

      - name: Deploy backend to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/ecom-netsuite
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            sleep 15
            curl -f http://localhost:8000/api/v1/health || exit 1
            docker compose -f docker-compose.prod.yml up -d --no-deps worker

      - name: Production health verification
        run: |
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.PRODUCTION_URL }}/api/v1/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Production health check failed"
          exit 1
