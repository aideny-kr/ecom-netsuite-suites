# Production Docker Compose for GCP Compute Engine
# Postgres → Supabase (external), Redis → Upstash (external)
# Runs: frontend (Next.js) + backend (FastAPI) + worker (Celery) + beat (Celery Beat)
#
# Usage:
#   docker compose -f docker-compose.prod.yml pull   # backend only (GHCR)
#   docker compose -f docker-compose.prod.yml up -d

services:
  frontend:
    image: ghcr.io/aideny-kr/ecom-netsuite-suites/frontend:latest
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      # Use 127.0.0.1, not localhost: the Next.js server binds IPv4 0.0.0.0:3000,
      # but `localhost` resolves to IPv6 ::1 in the container -> connection refused
      # (caused a permanently-"unhealthy" frontend despite serving fine).
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/aideny-kr/ecom-netsuite-suites/backend:latest
    env_file: .env.production
    ports:
      - "8000:8000"
    volumes:
      - workspace-data:/tmp/workspace_storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    image: ghcr.io/aideny-kr/ecom-netsuite-suites/backend:latest
    env_file: .env.production
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2 -Q default,sync,recon,export
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  beat:
    image: ghcr.io/aideny-kr/ecom-netsuite-suites/backend:latest
    env_file: .env.production
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - celerybeat-data:/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  celerybeat-data:
  workspace-data:
