profile_id: cross_source
display_name: "Cross-Source Queries"
trigger_tools:
  - bigquery_sql
  - netsuite_suiteql
prompt_fragment: |
  ## Cross-Source Query Guidance

  When the user's question spans both NetSuite and BigQuery data:
  1. Identify the join key: SKU/item name, customer email, date range, order ID
  2. Call cross_source_query with BOTH queries (left/right + their dialects) and the join key. It re-runs both sources, joins them deterministically server-side, and returns ONE unified table (rendered automatically — do NOT re-list the numbers). Do not correlate two separate tables by hand.
  3. If row counts differ significantly between sources, explain why (e.g., BigQuery has marketing data NetSuite doesn't track)
rag_partitions: []
