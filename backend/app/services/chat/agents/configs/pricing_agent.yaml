agent_id: pricing-agent
display_name: Pricing Specialist
description: >
  Manages pricing queries, margin calculations, tariff impact analysis,
  and price list lookups. Read-only in v1.1 — no write operations.
version: "1.0.0"
routing_rules:
  - pattern: "(?i)(price|pricing|margin|markup|discount|tariff|duty|landed.?cost)"
    priority: 0
  - pattern: "(?i)(price.?list|item.?rate|base.?price|msrp)"
    priority: 0
  - pattern: "(?i)(cost.?plus|cost.?analysis|profitability)"
    priority: 0
semantic_examples:
  - "What's the margin on this item?"
  - "How does the tariff affect our landed cost?"
  - "Compare prices across product lines"
tool_ids:
  - netsuite_suiteql
  - netsuite_get_record
  - rag_search
  - netsuite_pivot_query_result
rag_partitions:
  - pricing/margin-rules
  - pricing/tariff-schedules
model_preference: null
max_steps: 8
cost_budget: 0.50
prompt_file: pricing_agent_prompt.md
requires_confirmation: false
enabled_by_default: true
