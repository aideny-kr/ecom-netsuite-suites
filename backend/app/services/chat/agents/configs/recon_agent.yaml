agent_id: recon-agent
display_name: Reconciliation Specialist
description: >
  Runs Stripe-to-NetSuite reconciliation, investigates exceptions,
  classifies variances, and guides month-end close. Primary interface
  for all reconciliation workflows.
version: "1.0.0"
routing_rules:
  - pattern: "(?i)(reconcil|recon\\b)"
    priority: 0
  - pattern: "(?i)(payout.*match|match.*payout|unmatched.*deposit|deposit.*unmatched)"
    priority: 0
  - pattern: "(?i)(exception|variance|discrepancy)"
    priority: 0
  - pattern: "(?i)(stripe.*netsuite|netsuite.*stripe).*(match|reconcil|compar)"
    priority: 0
  - pattern: "(?i)(month.?end.*close|close.*period|lock.*period)"
    priority: 0
semantic_examples:
  - "Run reconciliation for March"
  - "Show me the exceptions"
  - "Why is payout po_xxx short by $432?"
  - "Approve this match"
  - "Close March reconciliation"
tool_ids:
  - recon_run
  - recon_get_exceptions
  - recon_get_evidence
  - recon_approve_match
  - netsuite_suiteql
  - rag_search
rag_partitions:
  - recon/matching-rules
  - recon/variance-taxonomy
model_preference: null
max_steps: 10
cost_budget: 0.50
prompt_file: recon_agent.md
requires_confirmation: true
enabled_by_default: false
