# Canonical regression case — Olivia's 2026-04-09 country sales question.
#
# This is the exact question that exposed the silent quality regression.
# Ground truth was verified via Claude + Oracle NetSuite MCP for Framework
# on 2026-04-09:
#   Switzerland: 18 orders, $26,689.13, 9 laptops
#   Norway: 3 orders, $3,116.86, 3 laptops
#   New Zealand: 3 orders, $1,866.92, 1 laptop
#   Singapore: 3 orders, $1,535.36, 0 laptops
#
# Note: the specific dollar amounts will drift day-to-day as new orders
# land. The benchmark uses substring matching on expected_answer_contains,
# so we check for the country names and that SOMETHING numeric is reported.
# For exact-number regression, re-seed the YAML with today's ground truth
# before each benchmark run.

case_id: sales_country_canonical
query: "give me the sales data of Norway, Switzerland, New Zealand and Singapore as of today, sales data includes total sales order amount and system sales qty"
tags: ["country", "shipping", "regression", "olivia-2026-04-09"]
notes: |
  Canonical regression case. Verified solvable by Claude + MCP on 2026-04-09.
  CANONICAL (fast) form — filter the RAW ISO code and date-scope the address join:
    JOIN transactionShippingAddress sa ON sa.nKey = t.shippingAddress
    WHERE sa.country IN ('NO', 'CH', 'NZ', 'SG')
      AND t.trandate >= TO_DATE(...)   -- bound the heavy address join
    GROUP BY BUILTIN.DF(sa.country)     -- BUILTIN.DF for the display label only
  The 2026-04-09 baseline used `WHERE BUILTIN.DF(sa.country) IN (...names...)`; that
  form is a per-row function on an unbounded join → 60s timeout on large accounts
  (2026-06) and is SUPERSEDED — do not teach it.
  Our agent failed this question multiple times in the same session due
  to pattern pollution + tool description truncation + context bloat.
expected_answer_contains:
  - "Norway"
  - "Switzerland"
  - "Singapore"
  - "New Zealand"
expected_tools:
  - "netsuite_suiteql"
expected_accuracy: 0.8
max_cost: 0.50
max_latency_ms: 120000
# Baseline fields for vs-MCP comparison
baseline_expected_accuracy: 0.8
baseline_expected_tools:
  - "ns_runCustomSuiteQL"
