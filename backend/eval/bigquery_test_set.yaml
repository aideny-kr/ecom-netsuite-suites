# BigQuery Eval Test Set — 40 cases
# Dialect rules: LIMIT N, backtick identifiers, SAFE_DIVIDE, DATE_TRUNC
# Schema: frameworkreporting.sales-orders_cleaned

- question: "What's our monthly revenue trend for the last 12 months?"
  dialect: bigquery
  expected_keywords: ["revenue", "month"]
  expected_sql_contains: ["DATE_TRUNC", "GROUP BY", "LIMIT", "netamount", "orderdate"]
  tables: ["frameworkreporting.sales-orders_cleaned"]
  difficulty: easy

- question: "Which product categories have the highest average order value?"
  dialect: bigquery
  expected_keywords: ["product", "category", "order", "value"]
  expected_sql_contains: ["AVG", "GROUP BY", "ORDER BY", "LIMIT", "itemclass"]
  tables: ["frameworkreporting.sales-orders_cleaned"]
  difficulty: easy

