  expected_keywords: ["revenue", "user", "arpu", "month"]
  expected_sql_contains: ["SAFE_DIVIDE", "DATE_TRUNC", "GROUP BY"]
  tables: ["frameworkreporting.sales-orders"]
  difficulty: medium

