# BigQuery Eval Test Set — 15 cases
# Dialect rules: LIMIT N, backtick identifiers, SAFE_DIVIDE, DATE_TRUNC

- question: "What's our monthly revenue trend for the last 12 months?"
  dialect: bigquery
  expected_keywords: ["revenue", "month", "trend"]
  expected_sql_contains: ["DATE_TRUNC", "GROUP BY", "LIMIT"]
  tables: ["frameworkreporting.sales-orders"]
  difficulty: easy

- question: "Which product categories have the highest average order value?"
  dialect: bigquery
  expected_keywords: ["product", "category", "order", "value"]
  expected_sql_contains: ["AVG", "GROUP BY", "ORDER BY", "LIMIT"]
  tables: ["frameworkreporting.sales-orders"]
  difficulty: easy

- question: "Show me customer cohort retention for the last 6 cohorts"
  dialect: bigquery
  expected_keywords: ["customer", "cohort", "retention"]
  expected_sql_contains: ["DATE_TRUNC", "WITH", "GROUP BY"]
  tables: ["frameworkreporting.sales-orders"]
  difficulty: hard

- question: "What is our average revenue per user (ARPU) by month?"
