# SuiteQL Eval Test Set — 40 cases
# Dialect rules: FETCH FIRST N ROWS ONLY, BUILTIN.DF(), TRUNC(SYSDATE), single-letter status codes
# Schema hints: status code mappings, BUILTIN.DF for display values, amount rules

- question: "What are the top 10 sales orders by amount this month?"
  dialect: suiteql
  expected_keywords: ["sales", "order", "amount"]
  expected_sql_contains: ["FETCH FIRST", "ORDER BY", "trandate", "SalesOrd", "foreigntotal"]
  tables: ["transaction"]
  difficulty: easy

- question: "Show me all open purchase orders with their vendors"
  dialect: suiteql
  expected_keywords: ["purchase", "order", "vendor"]
  expected_sql_contains: ["PurchOrd", "BUILTIN.DF(t.entity)", "status"]
  tables: ["transaction"]
  difficulty: easy

- question: "What is the total revenue by subsidiary this quarter?"
  dialect: suiteql
  expected_keywords: ["revenue", "subsidiary", "quarter"]
  expected_sql_contains: ["SUM", "GROUP BY", "BUILTIN.DF", "subsidiary", "TRUNC(SYSDATE"]
  tables: ["transaction"]
  difficulty: medium

- question: "List all customers with overdue invoices older than 30 days"
  dialect: suiteql
  expected_keywords: ["customer", "invoice", "overdue"]
  expected_sql_contains: ["CustInvc", "duedate", "TRUNC(SYSDATE)", "status", "'A'"]
  tables: ["transaction"]
  difficulty: medium

- question: "What are the inventory levels for active items below reorder point?"
